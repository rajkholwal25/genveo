{% extends "base.html" %}
{% block title %}Reset Password — Genveo{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Set a new password</h2>
    <p class="auth-subtitle">For <strong style="color:var(--primary-soft)">{{ email }}</strong></p>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" autofocus>
        <small class="field-hint">At least 6 characters</small>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm new password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Update password</button>
    </form>

    <p class="auth-footer">
      <a href="{{ url_for('auth.login') }}">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
