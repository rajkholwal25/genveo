{% extends "base.html" %}
{% block title %}Forgot Password — Genveo{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Forgot password</h2>
    <p class="auth-subtitle">Enter your registered email and we'll send you a reset link.</p>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block"><svg class="icon"><use href="#i-mail"/></svg> Send reset link</button>
    </form>

    <p class="auth-footer">
      Remembered it?
      <a href="{{ url_for('auth.login') }}">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
