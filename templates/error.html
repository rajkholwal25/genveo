{% extends "base.html" %}
{% block title %}{{ code }} — Genveo{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="error-card">
    <div class="error-code">{{ code }}</div>
    <h2>{{ title }}</h2>
    <p>{{ message }}</p>
    <div class="hero-cta" style="justify-content:center;margin-top:24px">
      <a href="{{ home_url }}" class="btn btn-primary"><svg class="icon"><use href="#i-arrow-right"/></svg> {{ home_label }}</a>
    </div>
  </div>
</div>
{% endblock %}
